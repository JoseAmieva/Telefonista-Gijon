# Despliegue automático en la VM de GCE.
# Requiere un secreto en GitHub: VM_SSH_KEY (clave privada SSH con acceso a la VM).
# También se puede lanzar manualmente: Actions → Deploy VM → Run workflow
name: Deploy VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 136.117.52.81
          username: jamievam
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            curl -fsSL https://raw.githubusercontent.com/JoseAmieva/Telefonista-Gijon/main/deploy/update_on_vm.sh | bash
